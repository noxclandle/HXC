version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # マイナー・パッチ更新はまとめて1本のPRにして、レビュー負荷を下げる。
      # メジャー更新（破壊的変更の可能性）は個別のPRのまま。
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
